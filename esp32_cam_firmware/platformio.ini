; PlatformIO 项目配置 — ESP32-CAM WiFi 摄像头
;
; 使用前请先配置 config/config.h（可从 config.example.h 复制）
;
; 打开方式: VSCode → 打开 esp32_cam_firmware/ → PlatformIO 自动识别

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

; PSRAM
board_build.arduino.memory_type = qspi_ram
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; 添加 config/ 目录到头文件搜索路径
    -Iconfig

lib_deps =
    me-no-dev/ESPAsyncWebServer @ 3.3.1
    me-no-dev/AsyncTCP @ 1.1.4
    esphome/esp32-camera @ 2.0.4
