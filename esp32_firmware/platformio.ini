; PlatformIO 项目配置 — CSL Recognition for ESP32-S3
;
; 通过 WiFi 接收 ESP32-CAM 的 MJPEG 视频流，
; 解码后运行 TFLite 推理，MQTT 发布结果。
;
; 打开方式: VSCode → 打开 esp32_firmware/ → PlatformIO 自动识别
;
; 首次编译前:
;   1. 训练模型: python train_model.py --model cnn
;   2. 量化导出: python quantize_model.py
;   3. 复制模型: python scripts/copy_model_to_firmware.py

; 使用前请先配置 config/user_config.h（可从 config/user_config.example.h 复制）

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

; PSRAM 配置（解码 JPEG 帧需要大量内存）
board_build.arduino.memory_type = qspi_ram
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
    ; 添加 config/ 目录到头文件搜索路径（放置 user_config.h）
    -Iconfig

lib_deps =
    ; MQTT
    knolleary/PubSubClient @ 2.8
    ; TFLite Micro
    espressif/tflite-micro @ 1.3.0
    ; JPEG 解码（用于解码 CAM 发来的 MJPEG 流）
    bodmer/TJpg_Decoder @ 1.2.10
